<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>To-Do-List</title>
</head>
<body id="body" class="bg-[#B8CFCE] flex items-center justify-center min-h-screen">
    <div id="To-Do-List" class="w-full sm:w-[90%] md:w-[70%] lg:w-[45%] bg-[#333446] rounded-xl p-4 ">  <!-- maindiv -->
        <div class="flex justify-center items-center text-3xl text-[#EAEFEF] font-bold">To-Do-List</div>
        <div class="flex justify-center items-center m-4">
            <input id="taskbar" type="text " class="w-1/2 h-12 p-4 rounded-lg outline outline-offset-2 outline-blue-300">
            <button id="addtask" class="w-24 h-14 m-4 rounded-lg bg-[#7F8CAA] text-3xl  text-[#EAEFEF] font-bold">Add</button>
        </div>
        <div class="flex justify-center items-center text-3xl text-[#EAEFEF] font-bold">Task List</div>
        <ul id="taskList"></ul>    

















    </div>  <!-- maindiv -->
</body>
</html>
